<!-- The minimum structure for the index.html file. -->
<!-- Used to create a basic HTML skeleton with a head and body section, as well as a title for the page. -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sruti</title> 
        
        <!-- Adding a link to the Google Fonts stylesheet to be able to use EB Garamond as the font for this website -->
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

        <!-- Adding a style block to set the background color of the body and remove default margins. -->
        <style>
            body{
                background: #01001e;
                margin: 0;
            }
        </style>
        
        <!-- Loading vis.js -->
        <link rel="stylesheet" href="https://unpkg.com/vis-network@9.1.9/styles/vis-network.min.css" />
        <script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>

    </head>  
    <body>
        <!-- Creates the constellation structure using vis.js. The container div is where the network will be rendered. -->
        <div id="constellation" style="width: 100vw; height: 100vh;"></div>

        <script>
            const nodes = new vis.DataSet([
                {id: "me", label: "Sruti", size: 12, shape: "dot", 
                 color: {
                    background: "#e8e4ff", 
                    border: "#c5ceff",
                    highlight:{
                        background: "#ffffff",
                        border: "#e8e4ff"
                    },
                    hover: {
                        background: "#ffffff",
                        border: "#e8e4ff"
                    }
                },
                 font: {
                    color: "#ffffff", 
                    size: 16,
                    face: "EB Garamond"}
                }
            ]);

            const edges = new vis.DataSet([]);

            const container = document.getElementById("constellation");
            const network = new vis.Network(container, {nodes, edges}, {
                physics: {
                    barnesHut: {
                        gravitationalConstant: -2000,
                        centralGravity: 0.1,
                        springLength: 150,
                        springConstant: 0.04,
                        damping: 0.09
                    }
                },
                interaction: {
                    hover: true,
                    hoverConnectedEdges: false
                }
            });

            // Animate a node's size from its current size to a target size
            function animateNodeSize (nodeId, targetSize, duration) {
                const startSize = nodes.get(nodeId).size;
                const startTime = performance.now();

                function step(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1); // 0 to 1

                    // Ease in-out: slow start, fast middle, slow end
                    const eased = progress < 0.5
                    ? 2*progress*progress
                    : -1 + (4-2*progress)*progress;

                    const currentSize = startSize + (targetSize - startSize) * eased;
                    nodes.update({id: nodeId, size: currentSize});

                    if (progress < 1) {
                        requestAnimationFrame(step); // keep going until done
                    }
                }

                requestAnimationFrame(step);

            }

            network.on("hoverNode", function (params) {
                animateNodeSize(params.node, 28, 200); // Animate to size 28 over 200ms
            });

            network.on("blurNode", function (params) {
                animateNodeSize(params.node, 12, 200); // Animate to size 12 over 200ms
            });

            // Allows a node to pulse between a minimum and maximum size over a specified duration
            function pulseNode(nodeId, minSize, maxSize, duration) {
                const startTime = performance.now();

                function step(currentTime) {
                    const elapsed = (currentTime - startTime) % duration;
                    const progress = elapsed / duration;

                    const eased = (Math.sin(progress * Math.PI * 2-Math.PI/2) + 1) / 2; // Sine wave easing
                    const currentSize = minSize + (maxSize - minSize) * eased;
                    nodes.update({id: nodeId, size: currentSize});

                    requestAnimationFrame(step);
                }

                requestAnimationFrame(step);
            }

            // Allows one node to pulse and grow while all other nodes fade out when hovered over
            network.on("hoverNode", function(params) {
                const hoveredId = params.node;

                nodes.get().forEach(function(node) {
                    if (node.id !== hoveredId) {
                        nodes.update({
                            id: node.id,
                            font: { color: "#ffffff10"},
                            color: {
                                background: node.color.background,
                                border: node.color.border,
                                opacity: 0.15
                            }
                        });
                    }
                });

                animateNodeSize(hoveredId, 28, 200); // Animate to size 28 over 200ms
            });

            network.on("blurNode", function(params) {
                nodes.get().forEach(function(node) {
                    nodes.get().forEach(function(node) {
                        nodes.update({id: node.id, size: 12});
                        nodes.update({id: node.id, opacity: 1});
                    });
                });
            });
            
        </script>
    </body>
</html>
